apiVersion: v1
kind: Service
metadata:
  name: pulsed
  labels:
    app: pulsed
spec:
  clusterIP: None
  selector:
    app: pulsed
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: gossip
      port: 7946
      targetPort: gossip
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: pulsed
  labels:
    app: pulsed
spec:
  selector:
    matchLabels:
      app: pulsed
  template:
    metadata:
      labels:
        app: pulsed
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: pulsed
          image: ghcr.io/offpeakengineer/pulsed:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: PULSED_HTTP
              value: ":8080"
            - name: PULSED_ADVERTISE_HTTP
              value: "http://$(NODE_IP):8080"
            - name: PULSED_GOSSIP
              value: ":7946"
            - name: PULSED_SEEDS
              value: "pulsed.default.svc.cluster.local:7946"
            - name: PULSED_DB
              value: "/data"
          ports:
            - name: http
              containerPort: 8080
            - name: gossip
              containerPort: 7946
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
