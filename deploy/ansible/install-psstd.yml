---
- name: Install pulsed as a systemd service
  hosts: pulsed
  become: true
  vars:
    pulsed_binary_src: ./pulsed
    pulsed_http: ":8080"
    pulsed_advertise_http: "http://{{ ansible_default_ipv4.address }}:8080"
    pulsed_gossip: ":7946"
    pulsed_seeds: ""
    pulsed_db: /var/lib/pulsed
  tasks:
    - name: Create pulsed user
      ansible.builtin.user:
        name: pulsed
        system: true
        home: "{{ pulsed_db }}"
        shell: /usr/sbin/nologin

    - name: Create config and data directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: /etc/pulsed, owner: root, group: root, mode: "0755" }
        - { path: "{{ pulsed_db }}", owner: pulsed, group: pulsed, mode: "0755" }

    - name: Install pulsed binary
      ansible.builtin.copy:
        src: "{{ pulsed_binary_src }}"
        dest: /usr/local/bin/pulsed
        owner: root
        group: root
        mode: "0755"

    - name: Install pulsed environment
      ansible.builtin.copy:
        dest: /etc/pulsed/pulsed.env
        owner: root
        group: root
        mode: "0644"
        content: |
          PULSED_HTTP={{ pulsed_http }}
          PULSED_ADVERTISE_HTTP={{ pulsed_advertise_http }}
          PULSED_GOSSIP={{ pulsed_gossip }}
          PULSED_SEEDS={{ pulsed_seeds }}
          PULSED_DB={{ pulsed_db }}
          PULSED_WEB=true

    - name: Install systemd unit
      ansible.builtin.copy:
        src: deploy/systemd/pulsed.service
        dest: /etc/systemd/system/pulsed.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart pulsed

    - name: Enable pulsed
      ansible.builtin.systemd:
        name: pulsed
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart pulsed
      ansible.builtin.systemd:
        name: pulsed
        state: restarted
        daemon_reload: true
