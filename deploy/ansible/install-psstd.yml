---
- name: Install psstd as a systemd service
  hosts: psstd
  become: true
  vars:
    psstd_binary_src: ./psstd
    psstd_http: ":8080"
    psstd_advertise_http: "http://{{ ansible_default_ipv4.address }}:8080"
    psstd_gossip: ":7946"
    psstd_seeds: ""
    psstd_db: /var/lib/psstd
  tasks:
    - name: Create psstd user
      ansible.builtin.user:
        name: psstd
        system: true
        home: "{{ psstd_db }}"
        shell: /usr/sbin/nologin

    - name: Create config and data directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: /etc/psstd, owner: root, group: root, mode: "0755" }
        - { path: "{{ psstd_db }}", owner: psstd, group: psstd, mode: "0755" }

    - name: Install psstd binary
      ansible.builtin.copy:
        src: "{{ psstd_binary_src }}"
        dest: /usr/local/bin/psstd
        owner: root
        group: root
        mode: "0755"

    - name: Install psstd environment
      ansible.builtin.copy:
        dest: /etc/psstd/psstd.env
        owner: root
        group: root
        mode: "0644"
        content: |
          PSSTD_HTTP={{ psstd_http }}
          PSSTD_ADVERTISE_HTTP={{ psstd_advertise_http }}
          PSSTD_GOSSIP={{ psstd_gossip }}
          PSSTD_SEEDS={{ psstd_seeds }}
          PSSTD_DB={{ psstd_db }}
          PSSTD_WEB=true

    - name: Install systemd unit
      ansible.builtin.copy:
        src: deploy/systemd/psstd.service
        dest: /etc/systemd/system/psstd.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart psstd

    - name: Enable psstd
      ansible.builtin.systemd:
        name: psstd
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart psstd
      ansible.builtin.systemd:
        name: psstd
        state: restarted
        daemon_reload: true
