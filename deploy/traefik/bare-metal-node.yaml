# Template for exposing one bare-metal pulsed node through Traefik running in Kubernetes.
#
# Apply one copy per bare-metal node, changing:
# - metadata/name
# - subsets.addresses.ip
# - Host(...)
#
# On the matching bare-metal node, set:
# PULSED_HTTP=:8080
# PULSED_ADVERTISE_HTTP=https://pulsed-node-a.example.com
# PULSED_GOSSIP=:7946
#
# This preserves hot-potato refreshes and peer links because every node has a
# stable browser-routable URL that Traefik routes to exactly one backend.
apiVersion: v1
kind: Service
metadata:
  name: pulsed-node-a
  namespace: default
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: pulsed-node-a
  namespace: default
subsets:
  - addresses:
      - ip: 10.0.1.25
    ports:
      - name: http
        port: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pulsed-node-a
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pulsed-node-a.example.com`)
      kind: Rule
      services:
        - name: pulsed-node-a
          port: 8080
  tls: {}
